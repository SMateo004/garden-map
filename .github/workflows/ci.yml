# GARDEN MVP — CI: tests on push (backend + frontend + E2E optional)
# Flexible for evolution: add deploy job, matrix, etc.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-api
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: test-jwt-secret-min-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garden-api/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      # ── Production build (catches tsc errors before Render does) ────────────
      # Uses tsconfig.build.json exactly as Render does — must pass with exit 0.
      # DATABASE_URL is a dummy for prisma generate (no actual DB connection needed).
      - name: Production build (prisma generate + tsc)
        run: npm run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garden-web/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      # TypeScript type-check — catches type errors before Vercel deploy
      - name: TypeScript type-check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run unit tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: garden-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci || npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Start frontend (Vite) and run E2E
        run: |
          npm run dev &
          DEV_PID=$!
          echo "Waiting for Vite to start..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null 2>&1 && echo "Server ready after ${i}×2s" && break
            sleep 2
          done
          # Abort if server never came up
          curl -sf http://localhost:5173 > /dev/null 2>&1 || { echo "ERROR: Vite failed to start"; kill $DEV_PID 2>/dev/null; exit 1; }
          CI=true ./node_modules/.bin/playwright test --config=playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
