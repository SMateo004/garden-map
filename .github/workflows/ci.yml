# GARDEN MVP — CI: tests on push (backend)

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-api
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: test-jwt-secret-min-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garden-api/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Production build (prisma generate + tsc)
        run: npm run build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true
