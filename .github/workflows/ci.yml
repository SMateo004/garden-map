# GARDEN MVP — CI: tests on push (backend + frontend + E2E optional)
# Flexible for evolution: add deploy job, matrix, etc.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-api
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_SECRET: test-jwt-secret-min-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garden-api/package-lock.json

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Install dependencies (no lockfile)
        if: failure()
        run: npm install

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garden-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Install dependencies (no lockfile)
        if: failure()
        run: npm install

      - name: Run unit tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage
        continue-on-error: true

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: garden-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        continue-on-error: true
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install dependencies (no lockfile)
        if: failure()
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start frontend (Vite) and run E2E
        run: |
          npm run dev &
          for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 | grep -q 200 && break; sleep 2; done
          CI=true npx playwright test --config=playwright.config.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
