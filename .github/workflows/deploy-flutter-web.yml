name: Deploy Flutter Web → Vercel

on:
  push:
    branches: [main]
    paths:
      - 'garden-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'garden-app/**'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-app

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Flutter setup (cached) ─────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      # ── 3. Dependencies (cached via pub-cache) ────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('garden-app/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      # ── 4. Flutter web build ──────────────────────────────────────────────
      - name: Build web (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          flutter build web \
            --release \
            --dart-define=API_URL=${{ secrets.API_URL }} \
            --pwa-strategy offline-first
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Build web (Preview)
        if: github.event_name == 'pull_request'
        run: |
          flutter build web \
            --release \
            --dart-define=API_URL=${{ secrets.API_URL_PREVIEW || secrets.API_URL }} \
            --pwa-strategy offline-first

      # ── 5. Install Vercel CLI ─────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ── 6. Pull Vercel project settings ──────────────────────────────────
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 7a. Deploy Production (main branch) ───────────────────────────────
      - name: Deploy → Production
        if: github.ref == 'refs/heads/main'
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 7b. Deploy Preview (pull requests) ────────────────────────────────
      - name: Deploy → Preview
        if: github.event_name == 'pull_request'
        id: preview-deploy
        run: |
          URL=$(vercel deploy \
            --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8. Comment preview URL on PR ──────────────────────────────────────
      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🌿 **Preview desplegado:** ${{ steps.preview-deploy.outputs.url }}`
            })
