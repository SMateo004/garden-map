name: Deploy API → Render

on:
  push:
    branches: [main]
    paths:
      - 'garden-api/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "::warning::Render deploy hook returned $STATUS — check RENDER_DEPLOY_HOOK_URL secret"
          fi
