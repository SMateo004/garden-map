<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Garden — Cuidadores de mascotas de confianza">

  <!-- ── Security headers ───────────────────────────────────────────────
       Nota: los headers HTTP del servidor tienen precedencia sobre estas
       etiquetas meta. Estas actúan como segunda capa para hosts estáticos
       que no permiten configurar cabeceras HTTP (p. ej. CDN sin _headers).
  ──────────────────────────────────────────────────────────────────── -->

  <!-- Content-Security-Policy
       frame-ancestors y X-Frame-Options se aplican vía HTTP headers de Vercel.
       Aquí solo se incluyen directivas válidas en meta (navegadores ignoran las otras).
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob: https:;
    connect-src 'self'
      https://garden-api-1ldd.onrender.com
      wss://garden-api-1ldd.onrender.com
      https://garden-mvp-three.vercel.app
      https://fonts.gstatic.com
      https://fonts.googleapis.com
      https://tile.openstreetmap.org
      https://res.cloudinary.com
      https://api.cloudinary.com;
    font-src 'self' data: https://fonts.gstatic.com;
    worker-src 'self' blob:;
    base-uri 'self';
    form-action 'self';
  ">

  <!-- Evita que el navegador adivine el tipo MIME de las respuestas -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- No enviar Referer al navegar a otros sitios -->
  <meta name="referrer" content="no-referrer">

  <!-- ── PWA / iOS meta tags & icons ───────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Garden">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Garden</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical Flutter assets for faster startup -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
