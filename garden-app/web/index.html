<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Garden — Cuidadores de mascotas de confianza">

  <!-- ── Security headers ───────────────────────────────────────────────
       Nota: los headers HTTP del servidor tienen precedencia sobre estas
       etiquetas meta. Estas actúan como segunda capa para hosts estáticos
       que no permiten configurar cabeceras HTTP (p. ej. CDN sin _headers).
  ──────────────────────────────────────────────────────────────────── -->

  <!-- Content-Security-Policy
       • default-src 'self'          — bloquea todo lo no listado explícitamente
       • script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'
                                     — Flutter web genera scripts inline y usa WASM
       • style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
                                     — Flutter inline + Google Fonts CSS
       • img-src 'self' data: blob: https:
                                     — imágenes propias, data-URI, blobs y HTTPS externo
       • connect-src 'self' https://garden-api-1ldd.onrender.com
                       wss://garden-api-1ldd.onrender.com
                       https://garden-mvp-three.vercel.app
                                     — API REST, WebSocket y Vercel production alias
       • font-src 'self' data: https://fonts.gstatic.com
                                     — fuentes propias + Google Fonts (Nunito, JetBrains Mono)
       • worker-src 'self' blob:     — service worker de PWA (Flutter lo genera en blob)
       • frame-ancestors 'none'      — impide que esta página sea embebida en un iframe
       • base-uri 'self'             — impide inyección en <base href>
       • form-action 'self'          — formularios solo pueden enviarse al mismo origen
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.gstatic.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: blob: https:;
    connect-src 'self'
      https://garden-api-1ldd.onrender.com
      wss://garden-api-1ldd.onrender.com
      https://garden-mvp-three.vercel.app
      https://www.gstatic.com
      https://fonts.gstatic.com
      https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    worker-src 'self' blob:;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
  ">

  <!-- Impide que esta página sea embebida en un <frame> o <iframe> -->
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- Evita que el navegador adivine el tipo MIME de las respuestas -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- No enviar Referer al navegar a otros sitios -->
  <meta name="referrer" content="no-referrer">

  <!-- ── PWA / iOS meta tags & icons ───────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Garden">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Garden</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
