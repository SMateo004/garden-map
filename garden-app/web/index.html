<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Garden — Cuidadores de mascotas de confianza">

  <!-- ── Security headers ───────────────────────────────────────────────
       Nota: los headers HTTP del servidor tienen precedencia sobre estas
       etiquetas meta. Estas actúan como segunda capa para hosts estáticos
       que no permiten configurar cabeceras HTTP (p. ej. CDN sin _headers).
  ──────────────────────────────────────────────────────────────────── -->

  <!-- Content-Security-Policy se aplica únicamente vía HTTP header en vercel.json
       (los headers HTTP tienen precedencia y evitan conflictos con el Service Worker cache).
       No usar meta tag CSP — causaba intersección restrictiva que bloqueaba blob: en CanvasKit.
  -->

  <!-- Evita que el navegador adivine el tipo MIME de las respuestas -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- No enviar Referer al navegar a otros sitios -->
  <meta name="referrer" content="no-referrer">

  <!-- ── PWA / iOS meta tags & icons ───────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Garden">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Garden</title>
  <meta name="google-signin-client_id" content="1067635397531-d9v8mtsm3to56m71krq6h5g01p1081vh.apps.googleusercontent.com">
  <!-- build: v4 -->
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical Flutter assets for faster startup -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">
</head>
<body>
  <script>
    // Unregister stale service workers so new builds always load fresh
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Facebook SDK for flutter_facebook_auth (web) -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId: '1517506836633363',
        cookie: true,
        xfbml: true,
        version: 'v21.0'
      });
    };
  </script>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
</body>
</html>
