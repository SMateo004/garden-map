<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Garden — Cuidadores de mascotas de confianza">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Garden">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Garden</title>
  <meta name="google-signin-client_id" content="1067635397531-d9v8mtsm3to56m71krq6h5g01p1081vh.apps.googleusercontent.com">
  <!-- build: v5 -->
  <link rel="manifest" href="manifest.json">

  <!-- Preload critical Flutter assets -->
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #garden-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }

    #garden-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #garden-loader img {
      width: 160px;
      margin-bottom: 32px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .garden-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(74, 124, 35, 0.15);
      border-top-color: #4A7C23;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(0.97); }
    }
  </style>
</head>
<body>

  <!-- Splash visible inmediatamente mientras Flutter inicializa -->
  <div id="garden-loader">
    <img src="logo-horizontal.png" alt="Garden">
    <div class="garden-spinner"></div>
  </div>

  <script>
    // Si no hay ruta Flutter específica → redirigir al landing React
    (function () {
      var h = window.location.hash;
      if (!h || h === '#' || h === '#/') {
        window.location.replace('/');
        return;
      }
      // Restaurar ruta cuando viene redirigido con ?_route=
      var r = new URLSearchParams(location.search).get('_route');
      if (r) history.replaceState(null, '', r);
    })();

    // Botón atrás que regresa a #/ → volver al landing React
    window.addEventListener('popstate', function () {
      var h = window.location.hash;
      if (!h || h === '#' || h === '#/') {
        setTimeout(function () { window.location.replace('/'); }, 0);
      }
    });
  </script>
  <script>
    // Ocultar splash cuando Flutter monta su primer canvas
    (function () {
      var loader = document.getElementById('garden-loader');
      var observer = new MutationObserver(function () {
        var canvas = document.querySelector('flt-glass-pane, canvas');
        if (canvas) {
          observer.disconnect();
          // Pequeño delay para que Flutter pinte el primer frame
          setTimeout(function () {
            loader.classList.add('fade-out');
            setTimeout(function () { loader.remove(); }, 400);
          }, 120);
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    })();

    // Unregister stale service workers para que builds nuevos carguen fresco
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Facebook SDK — carga diferida para no bloquear Flutter -->
  <script>
    window.fbAsyncInit = function () {
      FB.init({ appId: '1517506836633363', cookie: true, xfbml: true, version: 'v21.0' });
    };
  </script>
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>

</body>
</html>
