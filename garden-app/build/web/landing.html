<!-- Unregister stale Flutter service workers + fallback route guard -->
<script>
(function () {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { r.unregister(); });
    });
  }
  // Fallback: si alguien llega directo a /login, /marketplace, etc. redirigir a Flutter
  var p = window.location.pathname;
  var flutterRoutes = ['/login', '/register', '/marketplace', '/become-caregiver', '/booking', '/profile', '/admin'];
  if (flutterRoutes.some(function(r){ return p === r || p.startsWith(r + '/'); })) {
    window.location.replace('/app.html#' + p + window.location.search);
  }
})();
</script>

const SERVICES = [

  if (t === 'Conviértete en cuidador') return flutterUrl('/become-caregiver');
  const slug = t.toLowerCase()
    .normalize('NFD').replace(/[^\x00-\xFF]/g,'')
    .replace(/\s+/g, '-');
  return '#' + slug;
};

// ─── SEARCH BAR (Airbnb-style segmented) ───────────────────
const DOG_SIZES = [
  { id:'p-s', label:'Perro pequeño', sub:'Hasta 10 kg', emoji:'🐕' },
  { id:'p-m', label:'Perro mediano', sub:'10–25 kg', emoji:'🐕' },
  { id:'p-l', label:'Perro grande', sub:'+25 kg', emoji:'🐕‍🦺' },
];

const SearchBar = ({ onSearch }) => {
  const [open, setOpen] = useState(null); // 'service'|'where'|'when'|'pet'|null
  const [service, setService] = useState(null);
  const [zone, setZone] = useState(null);
  const [when, setWhen] = useState(null);
  const [pet, setPet] = useState(null);
  const [petStep, setPetStep] = useState('species'); // 'species'|'size'
  const wrapRef = useRef(null);

  useEffect(()=>{
    const h = (e)=>{ if(wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(null); };
    document.addEventListener('mousedown', h);
    return ()=>document.removeEventListener('mousedown', h);
  },[]);

  const svcLabel = service ? SERVICES.find(s=>s.id===service).label : 'Elegí un servicio';
  const canSearch = service || zone || when || pet;

  const Seg = ({ id, label, value, placeholder, first, onOpen }) => {
    const active = open === id;
    return (
      <button className="seg-btn" onClick={()=>{ if(!active && onOpen) onOpen(); setOpen(active?null:id); }} style={{
        flex:1, textAlign:'left', padding:'16px 24px', borderRadius:999,
        background: active ? 'var(--surface)' : 'transparent',
        boxShadow: active ? '0 10px 30px rgba(30,45,15,0.16)' : 'none',
        transition:'all .25s ease', position:'relative', minWidth:0,
      }}>
        <div className="mono" style={{ fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--text-hint)', fontWeight:600 }}>{label}</div>
        <div style={{ fontSize:16, fontWeight:value?800:600, color:value?'var(--text)':'var(--text-hint)', marginTop:3, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {value || placeholder}
        </div>
      </button>
    );
  };

  const Divider = () => <div style={{ width:1, height:34, background:'var(--border)', flexShrink:0, alignSelf:'center' }}/>;

  return (
    <div ref={wrapRef} style={{ position:'relative', width:'100%', maxWidth:940 }}>
      <div className="searchbar" style={{
        display:'flex', alignItems:'center', gap:4,
        background:'var(--surface)', borderRadius:999,
        border:'1px solid var(--border)',
        boxShadow:'0 18px 50px rgba(30,45,15,0.14)',
        padding:6,
      }}>
        <Seg id="service" label="Servicio" value={service?svcLabel:null} placeholder="Elegí un servicio" first/>
        <Divider/>
        <Seg id="where" label="Dónde" value={zone ? ZONES.find(z=>z.key===zone)?.label : null} placeholder="Tu zona en SCZ"/>
        <Divider/>
        <Seg id="when" label="Cuándo" value={when} placeholder="Agregá fecha"/>
        <Divider/>
        <Seg id="pet" label="Mascota" value={pet?PETS.find(p=>p.id===pet)?.label:null} placeholder="¿Quién va?" onOpen={()=>setPetStep('species')}/>
        <button className="search-btn" onClick={()=>onSearch({service,zone,when,pet})} style={{
          flexShrink:0, display:'flex', alignItems:'center', gap:10,
          background: canSearch ? 'var(--primary)' : 'var(--primary-light)',
          color:'var(--bg)', borderRadius:999, padding:'16px 26px', fontWeight:800, fontSize:16,
          transition:'all .25s ease', boxShadow:'0 8px 20px rgba(119,140,67,0.3)',
        }}>
          <IcoSearch size={20} stroke="var(--bg)"/>
          <span className="searchword">Buscar</span>
        </button>
      </div>

      {/* dropdown panels */}
      {open && (
        <div className="search-dropdown" style={{
          position:'absolute', top:'calc(100% + 14px)', left:0, right:0,
          background:'var(--surface)', borderRadius:28,
          border:'1px solid var(--border)', boxShadow:'0 24px 60px rgba(30,45,15,0.2)',
          padding:28, zIndex:20,
          animation:'pop .28s cubic-bezier(.2,.7,.3,1) both',
        }}>
          <style>{`@keyframes pop{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:none}}`}</style>

          {open==='service' && (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {SERVICES.map(s=>{
                const on = service===s.id;
                return (
                  <button key={s.id} onClick={()=>{setService(s.id);setOpen('where');}} style={{
                    display:'flex', alignItems:'center', gap:12, padding:'14px 16px', borderRadius:16,
                    background: on?'var(--lime)':'var(--surface-elev)',
                    border:`1.5px solid ${on?'var(--primary)':'var(--border)'}`,
                    textAlign:'left', transition:'all .2s ease',
                  }}>
                    <div className="svc-opt-icon" style={{ width:40, height:40, borderRadius:12, background:on?'var(--surface)':'var(--lime)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <s.Icon size={20} stroke="var(--primary-dark)"/>
                    </div>

const Reveal = ({ children, delay=0, style={} }) => {
  const ref = useRef(null);
  useEffect(()=>{
    const el = ref.current;
    const o = new IntersectionObserver(([e])=>{ if(e.isIntersecting){ el.classList.add('in'); o.disconnect(); } }, { threshold:0.15 });
    o.observe(el); return ()=>o.disconnect();
  },[]);
  return <div ref={ref} className="reveal" style={{ transitionDelay:`${delay}s`, ...style }}>{children}</div>;
};

          <a href="/" style={{ display:'flex', alignItems:'center', gap:10 }}>
            <PawLeaf size={36} color="var(--primary-light)"/>
            <span style={{ fontWeight:900, fontSize:28, letterSpacing:'-0.03em' }}>garden</span>
          </a>
          <p style={{ fontSize:15.5, color:'#8CAB6A', marginTop:16, lineHeight:1.55 }}>El primer marketplace verificado de servicios para mascotas en Bolivia.</p>
        </div>
        <div style={{ display:'flex', gap:64, flexWrap:'wrap' }}>
          {Object.entries(footerLinks).map(([h,items])=>(
            <div key={h}>
              <div className="mono" style={{ fontSize:12, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--accent)', fontWeight:600, marginBottom:16 }}>{h}</div>
              {items.map(([label, href])=>(
                <a key={label} href={href} style={{ display:'block', fontSize:15.5, color:'#8CAB6A', marginBottom:11, fontWeight:600 }}>{label}</a>
              ))}
            </div>
          ))}
        </div>
      </div>
      <div style={{ marginTop:56, paddingTop:28, borderTop:'1px solid #334D24', display:'flex', justifyContent:'space-between', flexWrap:'wrap', gap:16 }}>
        <span className="mono" style={{ fontSize:13, color:'#8CAB6A', letterSpacing:'0.06em' }}>GARDEN · Santa Cruz de la Sierra · www.gardenbo.com</span>
        <span className="mono" style={{ fontSize:13, color:'rgba(140,171,106,0.6)' }}>© 2026 Garden</span>
      </div>
    </div>
  </footer>
);

// ─── APP ───────────────────────────────────────────────────
function App() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(()=>{
    const h=()=>setScrolled(window.scrollY>30);
    window.addEventListener('scroll',h,{passive:true}); h();
    return ()=>window.removeEventListener('scroll',h);
  },[]);

  const handleSearch = (params) => {
    const p = {};
    // service: visita no existe en el API, omitir para mostrar todos
    if (params.service && params.service !== 'visita') p.service = params.service;
    // zone: clave uppercase para que Flutter la pre-seleccione en la UI
    if (params.zone) p.zone = params.zone;
    // mascota → petType + size (Flutter usa SMALL/MEDIUM/LARGE internamente)
    if (params.pet === 'gato') {
      p.petType = 'CATS';
    } else if (params.pet === 'p-s') {
      p.petType = 'DOGS'; p.size = 'SMALL';
    } else if (params.pet === 'p-m') {
      p.petType = 'DOGS'; p.size = 'MEDIUM';
    } else if (params.pet === 'p-l') {
      p.petType = 'DOGS'; p.size = 'LARGE';
    }
    window.location.href = flutterUrl('/marketplace', Object.keys(p).length ? p : null);
  };

  return (
    <div>
      <Nav scrolled={scrolled}/>
      <Hero onSearch={handleSearch}/>
      <Services/>
      <How/>
      <Trust/>
      <Download/>
      <Footer/>
      {/* Banner fijo en mobile para recomendar la app */}
      <div className="app-banner-mobile">
        <div style={{ display:'flex', alignItems:'center', gap:10, flex:1, minWidth:0 }}>
          <span style={{ fontSize:28, flexShrink:0 }}>🐾</span>
          <div style={{ minWidth:0 }}>
            <div style={{ fontWeight:800, fontSize:13.5, color:'var(--text)', lineHeight:1.2 }}>Mejor experiencia en la app</div>
            <div style={{ fontSize:12, color:'var(--text-sec)', marginTop:2 }}>Reservas, GPS y notificaciones</div>
          </div>
        </div>
        <div style={{ display:'flex', gap:8, flexShrink:0 }}>
          <a href={APP_STORE_URL} style={{ background:'#000', color:'#fff', padding:'9px 14px', borderRadius:10, fontSize:12, fontWeight:700, whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ fontSize:14 }}></span> iOS
          </a>
          <a href={PLAY_STORE_URL} style={{ background:'#000', color:'#fff', padding:'9px 14px', borderRadius:10, fontSize:12, fontWeight:700, whiteSpace:'nowrap', display:'flex', alignItems:'center', gap:5 }}>
            <span style={{ fontSize:13 }}>▶</span> Android
          </a>
        </div>
      </div>
      <style>{`
        /* ── Tablet (≤860px) ─────────────────── */
        @media (max-width:860px){
          .navlinks a:not([href="#descargar"]):not(.nav-register):not(.nav-login){display:none;}
          .nav-login{display:none !important;}
          .searchbar{flex-direction:column;border-radius:28px;padding:10px;gap:2px;}
          .searchbar > div[style*="width: 1px"]{display:none;}
          .searchbar button{border-radius:18px !important;}
          .searchword{display:inline;}
          .trust-grid{grid-template-columns:1fr !important;gap:48px !important;}
          .sec-pad{padding-top:80px !important;padding-bottom:80px !important;}
        }
        /* ── Mobile (≤620px) ─────────────────── */
        @media (max-width:620px){
          .nav-register{display:none !important;}
          .navlinks a[href="#descargar"]{display:none !important;}

          /* Searchbar: layout 2×2 horizontal en vez de columna */
          .searchbar{
            flex-direction:row !important;
            flex-wrap:wrap !important;
            border-radius:20px !important;
            padding:6px !important;
            gap:0 !important;
            align-items:stretch !important;
          }
          .searchbar .seg-btn{
            flex:none !important;
            width:50% !important;
            border-radius:14px !important;
            padding:12px 14px !important;
          }
          .searchbar .seg-btn .mono{ font-size:10px !important; }
          .searchbar .seg-btn > div:last-child{ font-size:14px !important; margin-top:2px !important; }
          .searchbar .search-btn{
            flex:none !important;
            width:100% !important;
            border-radius:14px !important;
            justify-content:center !important;
            padding:13px !important;
            margin-top:4px !important;
            font-size:15px !important;
          }
          /* Dropdown: más compacto, 1 columna en móvil */
          .search-dropdown{ padding:16px !important; border-radius:20px !important; }
          .search-dropdown > div{ grid-template-columns:1fr !important; gap:8px !important; }
          .svc-opt-icon{ width:32px !important; height:32px !important; border-radius:10px !important; }
          .pet-emoji{ font-size:20px !important; }
          .searchword{display:none;}

          /* Hero compacto: búsqueda visible sin hacer scroll */
          .hero-section{
            min-height:auto !important;
            padding:90px 5vw 32px !important;
          }
          .hero-h1{font-size:clamp(36px,10vw,52px) !important;}
          .hero-sub{font-size:16px !important;margin-top:16px !important;}
          .hero-trust{flex-direction:column;gap:10px;align-items:flex-start;margin-top:20px !important;}
          .hero-search-wrap{margin-top:28px !important;}

          /* Secciones: menos espacio vertical */
          .sec-pad{padding-top:60px !important;padding-bottom:60px !important;}

          /* Tarjetas de servicio: 1 columna */
          .svc-grid{grid-template-columns:1fr !important;}

          /* Sección download: espacio extra abajo para el banner fijo */
          .download-section{padding-bottom:110px !important;}

          /* Footer: extra bottom padding */
          .footer-inner{padding-bottom:100px !important;}

          /* Banner app fijo */
          .app-banner-mobile{display:flex !important;}
        }

        /* Banner app fijo — oculto en desktop */
        .app-banner-mobile{
          display:none;
          position:fixed;
          bottom:0;left:0;right:0;
          background:var(--surface);
          border-top:1px solid var(--border);
          padding:12px 16px 20px;
          align-items:center;
          gap:12px;
          z-index:100;
          box-shadow:0 -8px 32px rgba(30,45,15,0.12);
          padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
        }
      `}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
