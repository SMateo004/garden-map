services:
  - type: web
    name: garden-api
    runtime: node
    region: oregon
    plan: free
    rootDir: garden-api
    # npm ci with --prefer-offline if cache hit; NODE_OPTIONS caps tsc memory to avoid OOM on 512MB free tier
    # Resolve all previously-failed migrations (applied via db push) then deploy pending ones.
    # Running during build ensures DB is ready before the server starts.
    buildCommand: >-
      npm ci &&
      NODE_OPTIONS=--max-old-space-size=400 npm run build &&
      ./node_modules/.bin/prisma migrate resolve --applied 20260417191356_enable_row_level_security 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260417231505_add_refresh_tokens_and_stripe_event_id 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260425000001_sugerencia_precio_cascade 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260523000004_seed_guarderia_enabled 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260523000005_add_walker_photos 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260530000001_cap_max_pets_to_3 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260531000001_add_client_address_phone_verified_reset_code 2>/dev/null || true ;
      ./node_modules/.bin/prisma migrate deploy 2>&1 || true
    startCommand: node dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        value: https://garden-mvp-three.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://garden-mvp-three.vercel.app
      - key: VERCEL_DOMAINS
        value: https://garden-mvp-three.vercel.app
      - key: API_PUBLIC_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BLOCKCHAIN_ENABLED
        value: 'false'
      - key: BLOCKCHAIN_RPC_URL
        sync: false
      - key: BLOCKCHAIN_PRIVATE_KEY
        sync: false
      - key: BLOCKCHAIN_CONTRACT_ADDRESS
        sync: false
      - key: BLOCKCHAIN_PROFILES_ADDRESS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
