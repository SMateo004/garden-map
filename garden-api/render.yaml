services:
  - type: web
    name: garden-api
    runtime: node
    region: oregon
    plan: free
    rootDir: garden-api
    # npm ci with --prefer-offline if cache hit; NODE_OPTIONS caps tsc memory to avoid OOM on 512MB free tier
    buildCommand: npm ci && NODE_OPTIONS=--max-old-space-size=400 npm run build
    # Run migrations in background so the server starts within Render's 60s wake timeout.
    # All migration SQL is idempotent (IF NOT EXISTS / DO $$ blocks) — safe to re-run.
    startCommand: >-
      (./node_modules/.bin/prisma migrate resolve --applied 20260417191356_enable_row_level_security 2>/dev/null ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260417231505_add_refresh_tokens_and_stripe_event_id 2>/dev/null ;
      ./node_modules/.bin/prisma migrate resolve --applied 20260425000001_sugerencia_precio_cascade 2>/dev/null ;
      ./node_modules/.bin/prisma migrate deploy 2>&1 || echo "[warn] migrate deploy had issues") &
      node dist/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        value: https://garden-mvp-three.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://garden-mvp-three.vercel.app
      - key: VERCEL_DOMAINS
        value: https://garden-mvp-three.vercel.app
      - key: API_PUBLIC_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: REDIS_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: BLOCKCHAIN_ENABLED
        value: 'false'
      - key: BLOCKCHAIN_RPC_URL
        sync: false
      - key: BLOCKCHAIN_PRIVATE_KEY
        sync: false
      - key: BLOCKCHAIN_CONTRACT_ADDRESS
        sync: false
      - key: BLOCKCHAIN_PROFILES_ADDRESS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
